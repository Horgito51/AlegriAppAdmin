<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlegriApp | Panel administrativo</title>
    <link rel="icon" href="data:," />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/simple-datatables@9.0.3/dist/style.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css?v=20260615-6" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Navegacion principal">
        <nav class="nav-list">
          <button class="nav-item active" data-section="dashboard"><i class="bi bi-grid-1x2-fill"></i>Dashboard</button>
          <button class="nav-item" data-section="profesores"><i class="bi bi-person-badge"></i>Profesores</button>
          <button class="nav-item" data-section="cursos"><i class="bi bi-columns-gap"></i>Cursos</button>
          <button class="nav-item" data-section="materias"><i class="bi bi-journal-bookmark"></i>Materias</button>
          <button class="nav-item" data-section="asignaciones"><i class="bi bi-diagram-3"></i>Asignaciones</button>
        </nav>

        <div class="nav-group">
          <span>Equipo</span>
          <button class="nav-item muted" data-section="representantes"><i class="bi bi-people"></i>Representantes</button>
          <button class="nav-item muted" data-section="estudiantes"><i class="bi bi-backpack"></i>Estudiantes</button>
          <button class="nav-item muted" data-section="periodos"><i class="bi bi-calendar3"></i>Periodos</button>
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <p class="eyebrow">AlegriApp</p>
            <h1 id="page-title">Dashboard</h1>
          </div>
          <div class="topbar-actions">
            <button class="secondary-button" data-section-shortcut="profesores"><i class="bi bi-plus-lg"></i>Profesor</button>
            <button class="primary-button" data-section-shortcut="asignaciones"><i class="bi bi-diagram-3"></i>Asignar</button>
          </div>
        </header>

        <section id="dashboard" class="page-section active" data-title="Dashboard">
          <div class="dashboard-grid">
            <article class="summary-card">
              <span>Profesores</span>
              <strong id="metric-profesores">0</strong>
            </article>
            <article class="summary-card">
              <span>Cursos</span>
              <strong id="metric-cursos">0</strong>
            </article>
            <article class="summary-card">
              <span>Materias</span>
              <strong id="metric-materias">0</strong>
            </article>
            <article class="summary-card">
              <span>Asignaciones</span>
              <strong id="metric-asignaciones">0</strong>
            </article>
          </div>

          <div class="dashboard-board">
            <article class="board-main">
              <div>
                <p class="eyebrow">Gestion academica</p>
                <h2>Administracion de docentes, cursos y materias</h2>
              </div>
              <div class="quick-actions">
                <button data-section-shortcut="cursos"><i class="bi bi-columns-gap"></i>Cursos</button>
                <button data-section-shortcut="materias"><i class="bi bi-journal-bookmark"></i>Materias</button>
                <button data-section-shortcut="profesores"><i class="bi bi-person-badge"></i>Profesores</button>
                <button data-section-shortcut="asignaciones"><i class="bi bi-diagram-3"></i>Asignaciones</button>
              </div>
            </article>
          </div>
        </section>

        <section id="profesores" class="page-section" data-title="Profesores">
          <div id="profesores-root"></div>
        </section>

        <section id="cursos" class="page-section" data-title="Cursos">
          <div id="cursos-root"></div>
        </section>

        <section id="materias" class="page-section" data-title="Materias">
          <div id="materias-root"></div>
        </section>

        <section id="asignaciones" class="page-section" data-title="Asignaciones">
          <div id="asignaciones-root"></div>
        </section>

        <section id="representantes" class="page-section" data-title="Representantes">
          <div id="representantes-root"></div>
        </section>

        <section id="estudiantes" class="page-section" data-title="Estudiantes">
          <div id="estudiantes-root"></div>
        </section>

        <section id="periodos" class="page-section placeholder" data-title="Periodos academicos">
          <span class="badge text-bg-secondary">Pendiente</span>
          <h2>Periodos academicos</h2>
        </section>

      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="./js/config.js?v=20260615-6"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-datatables@9.0.3/dist/umd/simple-datatables.min.js"></script>
    <script type="module" src="./js/app.js?v=20260615-6"></script>
  </body>
</html>
